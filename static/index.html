<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Financial Analysis Agent</title>
<style>
  :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  body { max-width: 960px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; line-height: 1.5; }
  h1 { font-size: 1.25rem; }
  .sub { color: #666; font-size: .85rem; margin-top: -8px; }
  .disclaimer { color: #6b7280; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px 12px; font-size: .82rem; }
  #chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
  .chip { background: #eef2ff; color: #3730a3; border: 1px solid #c7d2fe; border-radius: 999px; padding: 5px 10px; cursor: pointer; font-size: .82rem; }
  form { display: flex; gap: 8px; margin: 20px 0; }
  input { flex: 1; padding: 10px 12px; font-size: 1rem; border: 1px solid #ccc; border-radius: 6px; }
  button { padding: 10px 16px; font-size: 1rem; border: 0; border-radius: 6px; background: #1a56db; color: #fff; cursor: pointer; }
  button:disabled { background: #9db8ec; cursor: default; }
  #clear { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
  #clear:hover { background: #e5e7eb; }
  #answer { white-space: pre-wrap; background: #f7f7f8; border: 1px solid #eee; border-radius: 8px; padding: 16px; min-height: 24px; }
  #gaps { color: #92400e; background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px; padding: 8px 12px; margin-top: 12px; display: none; }
  #quotes { color: #065f46; background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 6px; padding: 8px 12px; margin-top: 12px; display: none; font-size: .86rem; }
  #trace { color: #374151; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px 12px; margin-top: 12px; display: none; font-size: .86rem; }
  #messages { margin-top: 18px; display: grid; gap: 12px; }
  .message { border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px 14px; }
  .message.user { background: #eef2ff; }
  .message.assistant { background: #f7f7f8; white-space: pre-wrap; }
  h2 { font-size: .95rem; margin: 22px 0 8px; color: #444; }
  details { border: 1px solid #e5e5e5; border-radius: 6px; padding: 8px 12px; margin-bottom: 8px; }
  summary { cursor: pointer; font-weight: 600; font-size: .9rem; }
  details pre { white-space: pre-wrap; font-size: .82rem; color: #333; margin: 8px 0 0; }
  .tag { color: #1a56db; font-weight: 600; }
</style>
</head>
<body>
  <h1>Financial Analysis Agent</h1>
  <p class="sub">Filings RAG · XBRL facts · market quotes for Apple, JPMorgan Chase, Walmart, Coca-Cola, NVIDIA, and Caterpillar</p>
  <p class="disclaimer">Research support only. Market data may be delayed and answers are not investment advice.</p>
  <div id="chips">
    <button class="chip" data-q="What is NVIDIA's current stock price and latest reported revenue?">NVDA price + revenue</button>
    <button class="chip" data-q="Compare Apple's current market cap to its latest reported revenue.">AAPL market cap vs revenue</button>
    <button class="chip" data-q="What cybersecurity risks did Walmart disclose?">WMT risk factors</button>
  </div>

  <form id="form">
    <input id="q" placeholder="e.g. What was NVIDIA's total revenue?" autocomplete="off" autofocus>
    <button id="ask" type="submit">Ask</button>
    <button id="clear" type="button">Clear</button>
  </form>

  <div id="answer"></div>
  <div id="gaps"></div>
  <div id="quotes"></div>
  <div id="trace"></div>
  <div id="citations"></div>
  <div id="messages"></div>

<script>
const form = document.getElementById("form");
const qInput = document.getElementById("q");
const askBtn = document.getElementById("ask");
const clearBtn = document.getElementById("clear");
const answerEl = document.getElementById("answer");
const gapsEl = document.getElementById("gaps");
const quotesEl = document.getElementById("quotes");
const traceEl = document.getElementById("trace");
const citesEl = document.getElementById("citations");
const messagesEl = document.getElementById("messages");
let es = null;
let sessionId = localStorage.getItem("fairway_session_id") || null;

clearBtn.addEventListener("click", () => {
  if (es) { es.close(); es = null; }
  qInput.value = "";
  answerEl.textContent = "";
  citesEl.innerHTML = "";
  gapsEl.style.display = "none";
  quotesEl.style.display = "none";
  quotesEl.textContent = "";
  traceEl.style.display = "none";
  traceEl.textContent = "";
  messagesEl.innerHTML = "";
  sessionId = null;
  localStorage.removeItem("fairway_session_id");
  askBtn.disabled = false;
  qInput.focus();
});

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "message " + role;
  div.textContent = (role === "user" ? "You: " : "Agent: ") + text;
  messagesEl.appendChild(div);
}

form.addEventListener("submit", (e) => {
  e.preventDefault();
  const q = qInput.value.trim();
  if (!q) return;
  if (es) es.close();

  answerEl.textContent = "";
  citesEl.innerHTML = "";
  gapsEl.style.display = "none";
  quotesEl.style.display = "none";
  quotesEl.textContent = "";
  traceEl.style.display = "none";
  traceEl.textContent = "";
  askBtn.disabled = true;
  addMessage("user", q);

  fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: q, session_id: sessionId, stream: false})
  })
  .then((res) => res.json())
  .then((data) => {
    if (data.session_id) {
      sessionId = data.session_id;
      localStorage.setItem("fairway_session_id", sessionId);
    }
    answerEl.textContent = data.answer || "";
    addMessage("assistant", answerEl.textContent);
    if (data.gaps && data.gaps.length) {
      gapsEl.textContent = "Not found in the filings for: " + data.gaps.join(", ");
      gapsEl.style.display = "block";
    }
    const marketSources = (data.citations || []).filter((c) => c.chunk_id.includes("-MKT-"));
    if (marketSources.length) {
      quotesEl.textContent = marketSources.map((c) => c.text).join(" ");
      quotesEl.style.display = "block";
    }
    if (data.plan || data.tool_calls) {
      const actions = (data.plan?.actions || []).map((a) => a.tool).join(" → ");
      const tools = (data.tool_calls || []).map((t) => `${t.tool}: ${t.status}`).join(" · ");
      traceEl.textContent = "Plan: " + (actions || "n/a") + (tools ? " | Tools: " + tools : "");
      traceEl.style.display = "block";
    }
    if (data.citations && data.citations.length) {
      citesEl.innerHTML = "<h2>Sources</h2>";
      for (const c of data.citations) {
        const d = document.createElement("details");
        const s = document.createElement("summary");
        s.innerHTML = '<span class="tag">' + c.chunk_id + "</span> — " + c.company +
                      (c.section ? " · " + c.section : "");
        const pre = document.createElement("pre");
        pre.textContent = c.text;
        d.appendChild(s); d.appendChild(pre);
        citesEl.appendChild(d);
      }
    }
    askBtn.disabled = false;
  })
  .catch(() => {
    askBtn.disabled = false;
    answerEl.textContent = "Request failed. Please try again.";
  });
});

document.querySelectorAll(".chip").forEach((chip) => {
  chip.addEventListener("click", () => {
    qInput.value = chip.dataset.q;
    form.requestSubmit();
  });
});
</script>
</body>
</html>
