# Eval questions — YOU write these (guardrail G4: the runner must not author or grade them).
# Run:  python eval/run_eval.py
#
# Categories used in this set:
#   lookup            — single-company, single-figure from a specific financial statement
#   year_over_year    — change between two periods reported in the same 10-K
#   segment_lookup    — explicitly asks for a segment/division figure (not consolidated)
#   comparison        — multi-company, triggers decomposition
#   units             — figure whose unit differs from the table's stated unit label
#   fiscal_year       — cross-company comparison with differing fiscal year ends
#   footnote          — figure whose meaning changes once the qualifying note is read
#   precision         — two adjacent line items that are easy to confuse (top-line vs bottom-line etc.)
#   computed_metric   — answer requires arithmetic on two cited figures
#   semantic          — qualitative/conceptual query, no single numeric answer
#   alias             — tests a non-obvious entry in the router alias map
#   router_clarify    — no company named → should trigger clarify mode, no retrieval
#   router_edge       — exposes a known router ambiguity (mixed in/out-of-corpus)
#   refusal_oos       — out-of-corpus company → Gate 1 threshold refusal
#   refusal_undisclosed — in-corpus company, metric not disclosed in 10-K → Gate 2 synthesis refusal
#   multi_statement   — answer requires figures from two different financial statements

# ── LOOKUP: income statement ─────────────────────────────────────────────────

- question: "What was Apple's total operating income for fiscal year 2025?"
  category: lookup
  note: "Income-statement item, distinct from net income (which is after tax/interest).
         Apple labels it 'Total operating income' in Item 8. FY2025 ends Sep 27, 2025.
         Record exact figure + units (millions). Do NOT accept net income as a substitute —
         grading this tests whether the system distinguishes operating from net income."

- question: "How much net cash did NVIDIA generate from operating activities in its most
             recent fiscal year?"
  category: lookup
  note: "Cash flow statement (Consolidated Statements of Cash Flows), Item 8.
         Distinct from net income — operating cash flow includes working-capital adjustments
         and non-cash charges (e.g. stock-based compensation, depreciation).
         Tests whether cash flow statement chunks were indexed and are retrievable.
         Record the exact figure + fiscal year end (Jan 25/26, 2026)."

- question: "What was Caterpillar's long-term debt as of December 31, 2025?"
  category: lookup
  note: "Balance sheet item (Consolidated Balance Sheet), Item 8. May appear as
         'Long-term debt due after one year' or similar label. Verify the exact line-item
         label and value (in millions). Different from current portion of long-term debt —
         grade on whether the system retrieves the non-current long-term figure specifically."

# ── YEAR-OVER-YEAR ───────────────────────────────────────────────────────────

- question: "Did JPMorgan Chase's provision for credit losses increase or decrease from 2024
             to 2025, and by how much in dollar terms?"
  category: year_over_year
  note: "10-Ks present 2-3 years on the income statement. Provision for credit losses is a
         key banking line item (appears in JPM's income statement, Item 8). Tests whether the
         system extracts both years' figures from the same chunk or adjacent chunks and computes
         the direction and magnitude of change. Record both the 2024 and 2025 figures to grade."

- question: "How did NVIDIA's research and development expenses change from fiscal year 2025
             to fiscal year 2026, both in dollar terms and as a percentage of total revenue?"
  category: year_over_year
  note: "Two sub-parts: (1) dollar change = FY2026 R&D minus FY2025 R&D — both years are on
         the income statement in the same filing. (2) R&D as % of revenue requires dividing
         R&D by total revenue for each year — a computed ratio not stated in the filing.
         Grade part (1) on accuracy; grade part (2) on whether the system computes it or
         correctly states it is not directly reported. Record all four raw figures to verify."

# ── SEGMENT LOOKUP ───────────────────────────────────────────────────────────

- question: "What were Sam's Club's net sales for Walmart's fiscal year ended January 31, 2026?"
  category: segment_lookup
  note: "Explicitly asks for a SEGMENT figure. The correct answer is Sam's Club net sales from
         Walmart's segment table — NOT the consolidated $713,163M total. The system must label
         the figure as segment-level and not present it as Walmart's company-wide total.
         This is the inverse of the segment-vs-consolidated weakness: here the user WANTS the
         segment figure, so the synthesis rule 'prefer consolidated' must not override an
         explicit segment request. Record the Sam's Club net sales figure to grade."

# ── COMPARISON (decompose) ───────────────────────────────────────────────────

- question: "Which of the six companies reported the highest operating income (or closest
             equivalent) in its most recent fiscal year, and what were each company's figures?"
  category: comparison
  note: "Terminology varies by company — this is the core challenge:
           Apple: 'Total operating income'
           Walmart: 'Operating income'
           NVIDIA: 'Operating income'
           Caterpillar: 'Operating profit'
           Coca-Cola: 'Operating income'
           JPMorgan: does NOT report a clean operating income line (banking P&L structure
                     differs; 'income before income tax provision' is the closest).
         A correct answer names each company's figure with its specific label and flags
         JPMorgan's structural difference. Fill in all six figures from Item 8 to grade."

- question: "Which of the six companies had the lowest total revenue in its most recent fiscal year?"
  category: comparison
  note: "Superlative with no company named → SUPERLATIVE_RE in router.py should trigger
         decompose across all six. Correct answer is Coca-Cola (smallest top line by far).
         Answer must state each company's figure and fiscal year end, since periods differ.
         This also tests whether the superlative routing branch fires correctly without any
         company name in the question."

# ── UNITS TRAP ───────────────────────────────────────────────────────────────

- question: "What was NVIDIA's basic earnings per share for its fiscal year ended January 25, 2026?"
  category: units
  note: "Units trap: EPS is in DOLLARS PER SHARE (e.g. $2.99), not in millions like revenue/income
         figures on the same income statement. A system that blindly applies the table's
         'in millions' header to EPS would return a figure 1,000,000x too small or misstate
         the unit. Verify the exact EPS figure from the income statement and confirm the unit
         is 'per share' not 'millions'. Record the correct value."

# ── FISCAL YEAR MISMATCH (3 different year-ends) ─────────────────────────────

- question: "Compare Apple's, NVIDIA's, and Caterpillar's most recent net income. What fiscal
             period does each figure cover?"
  category: fiscal_year
  note: "Three companies, three different fiscal year ends:
           Apple: FY ends September 27, 2025
           NVIDIA: FY ends January 25/26, 2026
           Caterpillar: FY ends December 31, 2025
         The answer MUST state all three periods explicitly. Presenting these as the same year
         is wrong. Record all three net income figures and verify the periods are labeled.
         This is a harder version of the existing WMT/KO comparison (two FY ends → three)."

# ── COMPUTED METRIC ───────────────────────────────────────────────────────────

- question: "What was Coca-Cola's gross profit and gross profit margin for fiscal year 2025?"
  category: computed_metric
  note: "Two sub-parts: (1) gross profit — check whether it is stated directly on the income
         statement or must be computed as (Net operating revenues minus Cost of goods sold).
         (2) gross profit margin = gross profit / net operating revenues × 100 — a ratio not
         stated in the filing, requires arithmetic on two cited figures.
         Grade (1) on whether the figure is correct and cited; grade (2) on whether the system
         computes it correctly or honestly states it is not directly reported.
         Record net operating revenues and cost of goods sold to verify."

# ── SEMANTIC / QUALITATIVE ────────────────────────────────────────────────────

- question: "What cybersecurity risks did Walmart disclose in its most recent 10-K filing?"
  category: semantic
  note: "Qualitative, Item 1A content. No single figure to verify — grade on whether cited
         chunks are from Walmart's Item 1A and whether the answer accurately reflects what the
         filing actually says (not a generic description of cybersecurity risk). Tests semantic/
         dense retrieval of conceptual content where keyword overlap with the query may be low.
         Read Walmart's Item 1A cybersecurity section to verify content accuracy."

- question: "Which of the six companies identified supply chain disruption as a material risk
             factor in their most recent 10-K?"
  category: semantic
  note: "Qualitative, multi-company, Item 1A across all six. Triggers decompose (superlative/
         comparison phrasing across all). Tests semantic retrieval of a concept ('supply chain
         disruption risk') that may appear under different headings and phrasings per company.
         A correct answer names which companies disclosed this risk and briefly characterizes
         the disclosure. Read each company's Item 1A to verify; most should mention it."

# ── ALIAS ROUTING ─────────────────────────────────────────────────────────────

- question: "What was Chase's total net revenue for fiscal year 2025?"
  category: alias
  note: "Tests the router alias map: 'Chase' → ticker JPM (listed in config.ALIASES).
         Should route as mode=single, tickers=[JPM] — NOT clarify or oos.
         Correct figure is JPMorgan Chase's 'Total net revenue' from Item 8 (fiscal year
         ended December 31, 2025). If the system fails to identify Chase as JPMorgan and
         returns a clarify or oos response, the alias routing has failed. Record the figure."

# ── ROUTER: CLARIFY MODE ──────────────────────────────────────────────────────

- question: "What was total revenue last year?"
  category: router_clarify
  note: "No company named, no superlative, no other capitalized named entity.
         Expected router behavior: mode=clarify, no retrieval attempted, response asks
         which company the user means. Grade refusal-correct=yes if the system asks for
         clarification rather than retrieving. Grade refusal-correct=no if it guesses a
         company or retrieves anything. The refusal_reason in the output should be 'clarify'."

# ── ROUTER EDGE CASE ─────────────────────────────────────────────────────────

- question: "Compare Apple's and Tesla's most recent annual revenue."
  category: router_edge
  note: "Known router edge case (see DECISIONS.md). 'Apple' matches detect_companies →
         tickers=[AAPL], mode=single. Because detect_companies returns a non-empty list,
         the oos branch (which would catch 'Tesla' as an out-of-corpus named entity) never
         fires. EXPECTED behavior: system answers only for Apple and says nothing about Tesla
         not being in the corpus — the Tesla part of the question is silently dropped.
         GRADE: record what actually happens. Does it answer only Apple? Does it mention Tesla
         is not covered? This test documents the gap, not necessarily a failure — but the
         answer should make clear it only addresses Apple."

# ── REFUSAL: OUT-OF-CORPUS ───────────────────────────────────────────────────

- question: "What was Amazon's net income for its most recent fiscal year?"
  category: refusal_oos
  note: "Amazon is NOT in the corpus. Expected: refused via Gate 1 threshold (top_sim < 0.50).
         'Amazon' will be detected as a named entity by the router → mode=oos, unfiltered
         retrieval. The best matching chunk should score well below the 0.50 threshold.
         Record top_sim to extend the threshold calibration dataset (alongside Microsoft 0.454,
         Tesla 0.487). Grade refusal-correct=yes if refused via threshold."

# ── REFUSAL: IN-CORPUS BUT UNDISCLOSED ───────────────────────────────────────

- question: "What is Apple's employee engagement or satisfaction score?"
  category: refusal_undisclosed
  note: "Apple IS in the corpus. Employee engagement/satisfaction scores are NOT disclosed in
         10-K filings (10-Ks mention headcount and human capital programs but not scored metrics).
         Retrieval WILL return Apple chunks about its workforce (top_sim likely > 0.50), so
         Gate 1 will not fire. This must be caught by Gate 2: the synthesis prompt must say
         'not found' and Apple should appear in the gaps list.
         Grade refusal-correct=yes only if the system does not fabricate a score."

- question: "What is Caterpillar's Net Promoter Score from dealers or customers?"
  category: refusal_undisclosed
  note: "Caterpillar IS in the corpus. NPS is not a 10-K disclosure. Unlike JPMorgan NPS
         (already in the baseline eval), this tests a different company and metric category
         (dealer/customer satisfaction vs employee). Retrieval will return CAT chunks about
         dealer networks and customer relationships — plausible but lacking the metric.
         Gate 2 must catch it. Grade refusal-correct=yes if the system refuses to fabricate
         a score and names Caterpillar in the gaps or says 'not found'."

# ── MULTI-STATEMENT SYNTHESIS ─────────────────────────────────────────────────

- question: "For Caterpillar's fiscal year 2025, what was its net cash provided by operating
             activities, and how did that compare to its net income for the same period?"
  category: multi_statement
  note: "Requires two different financial statements in the same filing:
           (1) Net income — from the Consolidated Statements of Results of Operations (income stmt)
           (2) Net cash provided by operating activities — from the Consolidated Statement of
               Cash Flows
         A correct answer cites BOTH figures with DIFFERENT chunk IDs (one income-stmt chunk,
         one cash-flow chunk). If only one is cited, the system failed to retrieve one of the
         two statements. Record both figures from the filing to verify. The difference between
         operating cash flow and net income (cash conversion) is the substance of the answer."

# ── MULTI-STATEMENT RAG (metrics NOT in XBRL_CONCEPT_MAP → forces real retrieval) ─────

- question: "What were Apple's capital expenditures for fiscal year 2025, and what were its
             total assets as of September 27, 2025?"
  category: multi_statement
  note: "XBRL fast-path bypass test: 'capital expenditures' and 'total assets' do NOT match
         any pattern in XBRL_KEYWORD_MAP, so the system MUST fall through to RAG.

         Confirmed correct figures (verified by direct chunk search):
           Total assets (B/S):    AAPL-0063  → $359,241M as of Sep 27, 2025
           Capital expenditures:  AAPL-0068  → INGEST BUG: 'Purchases of property, plant
                                               and equipment' row is ABSENT from the
                                               serialized CFS chunk; only 'Other' and
                                               net investing totals appear. The capex figure
                                               is NOT retrievable regardless of query quality.

         Expected system behavior:
           xbrl_hit = False  ← PASS (XBRL bypass works correctly; confirmed in run)
           top_sim  = 0.73   ← PASS (strong in-corpus signal)
           Total assets: likely miss — AAPL-0063 (B/S) is in-corpus but does not rank in
             top-6 when combined with the capex query; isolated probe confirms it's accessible
             (appears 3rd at fused=0.029) but is crowded out in the compound query.
           Capital expenditures: definitive miss — row missing from ingest (see above).

         Grade: correct=no (two independent failures: one ingest, one retrieval);
                xbrl_hit=False is REQUIRED for this question to be graded at all.

         Requires two different financial statements:
           (1) Capital expenditures — CFS investing section (Item 8), chunk AAPL-0068.
               Row 'Purchases of property, plant and equipment' is missing from serialization.
           (2) Total assets — Consolidated Balance Sheet (Item 8), chunk AAPL-0063.
               Figure present ($359,241M) but chunk dropped from top-6 in compound query."

- question: "How much did NVIDIA pay in dividends during its fiscal year ended January 26, 2026,
             and what was its income tax provision for the same period?"
  category: multi_statement
  note: "XBRL fast-path bypass test: 'dividends' and 'income tax provision' do NOT match any
         pattern in XBRL_KEYWORD_MAP (the provision pattern requires '...credit|loan' within
         30 chars, which 'income tax provision' does not satisfy). System MUST fall to RAG.

         Confirmed correct figures (verified by direct chunk search):
           Dividends paid (CFS financing): NVDA-0055/0080 → $974M paid in FY2026
               (MD&A chunks: 'In fiscal year 2026, we paid cash dividends of $974 million')
           Income tax provision (I/S):     NVDA-0162      → $21,383M for FY2026
               (income tax expense from income statement)

         Expected system behavior:
           xbrl_hit = False  ← PASS (confirmed in run)
           top_sim  = 0.712  ← PASS
           Income tax found: YES (NVDA-0162 cited) ← PASS (income tax keywords dominate)
           Dividends found: NO — income tax query dominates the combined embedding; NVDA-0112
             (CFS financing) and NVDA-0055/0080 (MD&A dividend disclosure) are not in top-6.
             Isolated probe for dividends retrieves NVDA-0112 first (top_sim=0.669) — the
             data IS accessible but is crowded out in the compound multi-statement query.

         Grade: partially correct — income tax present, dividends absent.
                Two different statements needed (CFS financing + income statement).
                Root cause: single-embedding compound query favors income tax keywords."

- question: "How much did Walmart spend repurchasing its own shares during fiscal year ended
             January 31, 2026, and what was its total shareholders' equity at that date?"
  category: multi_statement
  note: "XBRL fast-path bypass test: 'share repurchases' and 'shareholders equity' do NOT match
         any XBRL_KEYWORD_MAP pattern. System MUST fall through to RAG.

         Confirmed correct figures (verified by direct chunk search):
           Share repurchases (CFS financing): WMT-0136 → 85.0M shares at avg $95.13/share
                                                          = $8,088M total cash paid
           Total Walmart shareholders' equity (B/S): WMT-0107 → $99,617M as of Jan 31, 2026
               (distinct from noncontrolling interest; Walmart-only equity subtotal)

         Expected system behavior:
           xbrl_hit = False  ← PASS (confirmed in run)
           top_sim  = 0.752  ← PASS
           Share repurchases found: YES ($8,088M, WMT-0136 cited) ← PASS
           Shareholders' equity found: NO — WMT-0107 (B/S) exists and ranks first in an
             isolated equity-only probe (top_sim=0.782), but is dropped from top-6 in the
             compound query because repurchase keywords dominate the combined embedding.

         Grade: partially correct — repurchases present, equity absent.
                Clearest example of the multi-statement compound-query retrieval failure:
                the equity chunk (WMT-0107) IS the highest-similarity match for an equity-only
                query, but it cannot compete when sharing a 6-slot budget with the repurchase
                intent. Citations should include WMT-0136 (CFS) AND WMT-0107 (B/S) — if only
                WMT-0136 is cited, the second-statement retrieval has failed.
                Correct equity figure: $99,617M (Total Walmart shareholders' equity)."

# ── DELIBERATE FAILURE (brittleness probe) ────────────────────────────────────

- question: "What was NVIDIA's Data Center segment revenue for its fiscal year ended January 25, 2026?"
  category: segment_lookup
  note: "DELIBERATE FAILURE — documents a known architectural gap in the XBRL fast path.

         Actual system behavior (confirmed by probe run):
           xbrl_hit=True, metric='revenue' — XBRL intercepts the query because the keyword
           'revenue' matches before any segment check. The XBRL chunk only has the consolidated
           total ($215,938M). Claude correctly says the segment figure is 'not found' rather
           than misreporting the consolidated total, but the Data Center figure IS disclosed
           in NVIDIA's Item 8 Segment Information note. It is never retrieved because XBRL
           blocked RAG from running.

         The correct answer is NVIDIA's Data Center segment revenue from Item 8. Look it up
         in the 10-K to fill in the figure for grading. The segment figure is a large but
         DISTINCT subset of the $215,938M consolidated total.

         Root cause: xbrl_lookup's segment bail-out is hardcoded for a fixed list of known
         segment names (Sam's Club, CAT Financial Products, ME&T). 'Data Center' is not on
         that list, so the bail-out does not fire. A general fix requires either
         (a) detecting compound-noun segment phrases before the metric keyword, or
         (b) an LLM classifier for segment vs. consolidated intent.

         Grade: correct=no (segment figure missing — answer says 'not found' which is honest
                            but incomplete; the figure is in the filing);
                grounded=no (XBRL chunk has no segment breakdown; RAG was never consulted);
                refusal-correct=N/A."
